name: terminology

on:
  push:
  pull_request:

jobs:
  check-terminology:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run terminology linter
        run: python scripts/check_terminology.py
